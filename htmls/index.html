<!DOCTYPE html>
<html lang="es">
<head>
    <title>CineK - Tu cine online</title>
    <link rel="icon" href="https://png.pngtree.com/png-clipart/20221006/ourmid/pngtree-popcorn-logo-png-image_6287125.png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="../img/cinekklogo.png" alt="CineK Logo" style="width: 90px; height: auto;">
                </a>
                <h1>CineK</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="cartelera.html">Cartelera</a></li>
                    <li><a href="estrenos.html">Estrenos</a></li>
                    <li><a href="trailer.html">Trailers</a></li>
                    <li><a href="comida.html">Comida</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-marquee">
            <div id="hero-track" class="hero-track"></div>
        </div>
        <div class="hero-content">
            <a href="cartelera.html" class="btn">Ver cartelera</a>
        </div>
    </section>

    <hr>

    <!-- CARTELERA RESUMIDA -->
    <section id="cartelera" class="section">
        <h2>Películas en cartelera</h2>
        <div id="resumen-cartelera" class="resumen-cartelera"></div>
        <p class="text-center"><a href="cartelera.html" class="btn">Ver cartelera completa</a></p>
    </section>

    <hr>

    <!-- ESTRENOS DESTACADOS -->
    <section id="estrenos" class="section">
        <h2>Próximos estrenos destacados</h2>
        <div id="estrenos-destacados" class="estrenos-container"></div>
    </section>


    <!-- FOOTER -->
    <footer>
    <div class="footer-content footer-simple">
        <div class="footer-section">
            <h3>CineK</h3>
            <p>Tu cine de confianza.</p>
        </div>

        <div class="footer-section">
            <h3>Ubicación</h3>
            <p>Little St James Island</p>
            <a href="https://www.google.com/maps/search/?api=1&query=Little+St+James+Island" target="_blank" rel="noopener noreferrer">Ver en Google Maps</a>
        </div>

        <div class="footer-section">
            <h3>Contacto</h3>
            <p>info@cinek.es</p>
        </div>
    </div>
    <p class="footer-bottom">&copy; 2026 CineK.</p>
</footer>
    <script>
        const TMDB_API_KEY = "4f0675e02026147f07c5129d1d1d5f16";
        const TMDB_BASE_URL = "https://api.themoviedb.org/3";
        const TMDB_IMAGE_URL = "https://image.tmdb.org/t/p/w500";

        const heroTrack = document.getElementById("hero-track");
        const resumenCartelera = document.getElementById("resumen-cartelera");
        const estrenosDestacados = document.getElementById("estrenos-destacados");

        function getPosterUrl(pelicula) {
            if (!pelicula.poster_path) {
                return "../img/cinekklogo.png";
            }

            return `${TMDB_IMAGE_URL}${pelicula.poster_path}`;
        }

        function crearHeroCard(pelicula, estado) {
            return `
                <div class="hero-card">
                    <img src="${getPosterUrl(pelicula)}" alt="${pelicula.title}">
                    <h3>${pelicula.title}</h3>
                    <p>${estado}</p>
                </div>
            `;
        }

        function pintarHero(cartelera, proximamente) {
            const peliculasHero = [
                ...cartelera.slice(0, 6).map(pelicula => crearHeroCard(pelicula, "En cartelera")),
                ...proximamente.slice(0, 6).map(pelicula => crearHeroCard(pelicula, "Próximamente"))
            ];

            heroTrack.innerHTML = peliculasHero.join("") + peliculasHero.join("");
        }

        function generarDatosResumen(index) {
            const generos = ["Acción", "Drama", "Comedia", "Animación", "Ciencia ficción", "Aventura", "Terror", "Suspense"];
            const duraciones = ["102 min", "114 min", "126 min", "138 min", "145 min", "158 min"];

            return {
                genero: generos[index % generos.length],
                duracion: duraciones[index % duraciones.length]
            };
        }

        function pintarResumenCartelera(peliculas) {
            resumenCartelera.innerHTML = "";

            peliculas.slice(0, 4).forEach((pelicula, index) => {
                const datos = generarDatosResumen(index);
                const item = document.createElement("div");
                item.className = "resumen-pelicula";

                item.innerHTML = `
                    <div>
                        <h3>${pelicula.title}</h3>
                        <p>${datos.genero} · ${datos.duracion}</p>
                    </div>
                    <a href="cartelera.html" class="vermascartelera">Ver más</a>
                `;

                resumenCartelera.appendChild(item);
            });
        }

        function pintarEstrenosDestacados(peliculas) {
            estrenosDestacados.innerHTML = "";

            peliculas.slice(0, 4).forEach((pelicula) => {
                const estreno = document.createElement("div");
                estreno.className = "estreno";

                estreno.innerHTML = `
                    <img src="${getPosterUrl(pelicula)}" alt="${pelicula.title}">
                    <h3>${pelicula.title}</h3>
                    <p>${pelicula.release_date ? new Date(pelicula.release_date).toLocaleDateString("es-ES") : "Fecha no disponible"}</p>
                    <a href="trailer.html">Ver trailer</a>
                `;

                estrenosDestacados.appendChild(estreno);
            });
        }

        async function cargarIndexDinamico() {
            try {
                const hoy = new Date();
                const fechaHoy = hoy.toISOString().split("T")[0];
                const fechaLimiteProximos = new Date();
                fechaLimiteProximos.setFullYear(hoy.getFullYear() + 2);
                const fechaMaxProximos = fechaLimiteProximos.toISOString().split("T")[0];

                const [respuestaCartelera, respuestaProximamente] = await Promise.all([
                    fetch(`${TMDB_BASE_URL}/movie/now_playing?api_key=${TMDB_API_KEY}&language=es-ES&region=ES&page=1`),
                    fetch(`${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&language=es-ES&region=ES&sort_by=popularity.desc&primary_release_date.gte=${fechaHoy}&primary_release_date.lte=${fechaMaxProximos}&with_release_type=2|3&page=1`)
                ]);

                const datosCartelera = await respuestaCartelera.json();
                const datosProximamente = await respuestaProximamente.json();

                if (!datosCartelera.results || !datosProximamente.results) {
                    return;
                }

                const proximamentePopular = datosProximamente.results
                    .filter(pelicula => pelicula.poster_path && pelicula.release_date >= fechaHoy)
                    .sort((a, b) => b.popularity - a.popularity);

                pintarHero(datosCartelera.results, proximamentePopular);
                pintarResumenCartelera(datosCartelera.results);
                pintarEstrenosDestacados(proximamentePopular);
            } catch (error) {
                console.error("No se pudo cargar la cartelera dinámica del inicio.", error);
            }
        }

        cargarIndexDinamico();
    </script>
</body>
</html>
